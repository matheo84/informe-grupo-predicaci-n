<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informe de Grupo de Predicación – Marzo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:   #0d2340;
    --blue:   #1a4a7a;
    --sky:    #2e7fce;
    --gold:   #c8963e;
    --cream:  #f7f3ed;
    --white:  #ffffff;
    --ink:    #1c1c1c;
    --muted:  #6b7280;
    --border: #d1c9be;
    --input-bg: #fdfbf8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    font-family: 'Source Sans 3', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem 3rem;
  }

  /* ── Paper ── */
  .paper {
    background: var(--white);
    width: 100%;
    max-width: 680px;
    border-radius: 2px;
    box-shadow:
      0 2px 4px rgba(0,0,0,.06),
      0 8px 32px rgba(13,35,64,.12),
      0 0 0 1px rgba(13,35,64,.07);
    overflow: hidden;
    animation: rise .55s cubic-bezier(.22,.68,0,1.2) both;
  }
  @keyframes rise {
    from { opacity:0; transform:translateY(24px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ── Header ── */
  .header {
    background: var(--navy);
    padding: 1.8rem 2.2rem 1.4rem;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content:'';
    position:absolute; inset:0;
    background: repeating-linear-gradient(
      135deg,
      transparent 0, transparent 18px,
      rgba(255,255,255,.03) 18px, rgba(255,255,255,.03) 19px
    );
  }
  .header-badge {
    display: inline-block;
    font-family: 'Source Sans 3', sans-serif;
    font-size: .68rem;
    font-weight: 600;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid rgba(200,150,62,.4);
    padding: .25rem .75rem;
    border-radius: 2px;
    margin-bottom: .9rem;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.35rem, 4vw, 1.8rem);
    color: var(--white);
    line-height: 1.2;
    font-weight: 900;
    letter-spacing: -.01em;
  }
  .header-sub {
    margin-top: .55rem;
    font-size: .9rem;
    color: rgba(255,255,255,.55);
    font-weight: 300;
  }
  .mes-tag {
    display: inline-block;
    background: var(--gold);
    color: var(--navy);
    font-weight: 700;
    font-size: .85rem;
    letter-spacing: .08em;
    padding: .2rem .8rem;
    border-radius: 2px;
    margin-left: .4rem;
    text-transform: uppercase;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }

  /* ── Accent stripe ── */
  .stripe {
    height: 4px;
    background: linear-gradient(90deg, var(--gold) 0%, var(--sky) 60%, var(--blue) 100%);
  }

  /* ── Form body ── */
  .form-body {
    padding: 2rem 2.2rem 2.4rem;
    display: flex;
    flex-direction: column;
    gap: 1.8rem;
  }

  /* ── Section ── */
  .section { display: flex; flex-direction: column; gap: .9rem; }
  .section-label {
    font-size: .68rem;
    font-weight: 700;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--sky);
    display: flex;
    align-items: center;
    gap: .55rem;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  /* ── Field ── */
  .field { display: flex; flex-direction: column; gap: .35rem; }
  .field label {
    font-size: .78rem;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: .03em;
  }
  .field select,
  .field input[type="text"],
  .field input[type="number"],
  .field textarea {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: .62rem .85rem;
    font-family: 'Source Sans 3', sans-serif;
    font-size: .95rem;
    color: var(--ink);
    transition: border-color .2s, box-shadow .2s;
    outline: none;
    width: 100%;
  }
  .field select:focus,
  .field input:focus,
  .field textarea:focus {
    border-color: var(--sky);
    box-shadow: 0 0 0 3px rgba(46,127,206,.12);
  }
  .field textarea { resize: vertical; min-height: 90px; }

  /* ── Two-column grid ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: .9rem 1.2rem; }

  /* ── Radio/Checkbox group ── */
  .choice-group {
    display: flex;
    gap: .65rem;
    flex-wrap: wrap;
  }
  .choice {
    display: flex;
    align-items: center;
    gap: .45rem;
    cursor: pointer;
    padding: .5rem .9rem;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    transition: all .18s;
    background: var(--input-bg);
    flex: 1;
    min-width: 100px;
    justify-content: center;
  }
  .choice:hover { border-color: var(--sky); background: #f0f6fd; }
  .choice input { accent-color: var(--sky); width: 16px; height: 16px; cursor: pointer; }
  .choice.selected {
    border-color: var(--sky);
    background: rgba(46,127,206,.09);
  }
  .choice span {
    font-size: .9rem;
    font-weight: 600;
    color: var(--ink);
  }

  /* ── Precursor cards ── */
  .prec-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .7rem; }
  .prec-card {
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: .75rem .6rem;
    text-align: center;
    cursor: pointer;
    transition: all .18s;
    background: var(--input-bg);
    position: relative;
  }
  .prec-card:hover { border-color: var(--sky); background: #f0f6fd; }
  .prec-card input { position: absolute; opacity: 0; width: 0; height: 0; }
  .prec-card.selected {
    border-color: var(--sky);
    background: rgba(46,127,206,.09);
  }
  .prec-card.selected .prec-name { color: var(--sky); }
  .prec-icon { font-size: 1.4rem; margin-bottom: .3rem; }
  .prec-name { font-size: .82rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--ink); }
  .check-dot {
    position: absolute;
    top: .4rem; right: .4rem;
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: white;
    display: flex; align-items: center; justify-content: center;
    font-size: .55rem;
    transition: all .18s;
  }
  .prec-card.selected .check-dot {
    background: var(--sky);
    border-color: var(--sky);
    color: white;
  }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: .1rem 0;
  }

  /* ── Footer ── */
  .form-footer {
    background: var(--navy);
    padding: 1rem 2.2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .footer-note {
    font-size: .78rem;
    color: rgba(255,255,255,.5);
    font-weight: 300;
  }
  .btn-print {
    background: var(--gold);
    color: var(--navy);
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 700;
    font-size: .85rem;
    letter-spacing: .07em;
    text-transform: uppercase;
    border: none;
    padding: .55rem 1.3rem;
    border-radius: 2px;
    cursor: pointer;
    transition: opacity .18s, transform .18s;
  }
  .btn-print:hover { opacity: .88; transform: translateY(-1px); }
  .btn-print:active { transform: translateY(0); }

  /* ── Print styles ── */
  @media print {
    body { background: white; padding: 0; }
    .paper { box-shadow: none; max-width: 100%; }
    .btn-print { display: none; }
    .form-footer { background: var(--navy) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .stripe { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }

  @media (max-width: 480px) {
    .form-body { padding: 1.4rem 1.2rem; }
    .prec-grid { grid-template-columns: 1fr 1fr 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="paper">

  <!-- Header -->
  <div class="header">
    <div class="header-badge">Congregación</div>
    <h1>Informe de Grupo<br>de Predicación <span class="mes-tag" id="mes-actual"></span></h1>
    <p class="header-sub">Completa todos los campos y entrégalo al conductor del grupo</p>
  </div>
  <div class="stripe"></div>

  <!-- Form -->
  <div class="form-body">

    <!-- Nombre -->
    <div class="section">
      <div class="section-label">Datos del Publicador</div>
      <div class="field">
        <label for="nombre">Nombre completo</label>
        <select id="nombre">
          <option value="" disabled selected>— Selecciona tu nombre —</option>
          <option>Alvarado Mejía, Franklyn</option>
          <option>Cabrera López, Mariela</option>
          <option>Cabrera, Martina de</option>
          <option>Caná, Gabriel</option>
          <option>Caná, Mercedes de</option>
          <option>Caro, Lucía de</option>
          <option>Caro, Saúl</option>
          <option>Cosme Yach, Susana</option>
          <option>García, Dacia</option>
          <option>Mucún, Gladys</option>
          <option>Ordoñez, Adela de</option>
          <option>Ordoñez, Candelario</option>
          <option>Palencia Cabrera, Erick</option>
          <option>Palencia Cabrera, Nataly</option>
          <option>Palencia, Olga Cabrera de</option>
          <option>Queché Mejía, Lilian</option>
          <option>Queché Mejía, Mateo</option>
          <option>Ramos, Joselín</option>
          <option>Ruiz, Erick</option>
          <option>Ruiz, Kathy de</option>
          <option>Shovin, Gerwer</option>
          <option>Shovin, María de</option>
        </select>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Participación -->
    <div class="section">
      <div class="section-label">Participación en el Ministerio</div>
      <div class="field">
        <label>¿Tuvo participación este mes?</label>
        <div class="choice-group" id="participacion">
          <label class="choice" onclick="toggleChoice(this,'participacion')">
            <input type="radio" name="participacion" value="si"> <span>✅ Sí</span>
          </label>
          <label class="choice" onclick="toggleChoice(this,'participacion')">
            <input type="radio" name="participacion" value="no"> <span>❌ No</span>
          </label>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Cursos -->
    <div class="section">
      <div class="section-label">Cursos Bíblicos</div>
      <div class="field">
        <label for="cursos">Número de cursos</label>
        <input type="number" id="cursos" min="0" placeholder="0">
      </div>
    </div>

    <div class="divider"></div>

    <!-- Solo Precursores -->
    <div class="section">
      <div class="section-label">Solo Precursores</div>
      <div class="field">
        <label>Tipo de precursor</label>
        <div class="prec-grid" id="precursor">
          <div class="prec-card" onclick="selectPrec(this)">
            <input type="radio" name="precursor" value="auxiliar">
            <div class="check-dot">✓</div>
            <div class="prec-icon">🟡</div>
            <div class="prec-name">Auxiliar</div>
          </div>
          <div class="prec-card" onclick="selectPrec(this)">
            <input type="radio" name="precursor" value="regular">
            <div class="check-dot">✓</div>
            <div class="prec-icon">🔵</div>
            <div class="prec-name">Regular</div>
          </div>
          <div class="prec-card" onclick="selectPrec(this)">
            <input type="radio" name="precursor" value="especial">
            <div class="check-dot">✓</div>
            <div class="prec-icon">⭐</div>
            <div class="prec-name">Especial</div>
          </div>
        </div>
      </div>

      <div class="field">
        <label for="horas">Total de horas</label>
        <input type="number" id="horas" min="0" placeholder="0">
      </div>
    </div>

    <div class="divider"></div>

    <!-- Observaciones -->
    <div class="section">
      <div class="section-label">Observaciones</div>
      <div class="field">
        <label for="obs">Notas adicionales (opcional)</label>
        <textarea id="obs" placeholder="Escribe cualquier observación relevante…"></textarea>
      </div>
    </div>

  </div><!-- /form-body -->

  <!-- Footer -->
  <div class="form-footer">
    <span class="footer-note">Entregar al conductor del grupo al final del mes</span>
    <button class="btn-print" id="btn-sheets" style="background:#0f7a3e;color:#fff;" onclick="enviarAlSheets()">📤 Enviar a Sheets</button>
  </div>

  <!-- Toast -->
  <div id="toast" style="display:none;position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#1a3a5c;color:#fff;padding:.75rem 1.5rem;border-radius:4px;font-size:.9rem;box-shadow:0 4px 16px rgba(0,0,0,.25);z-index:999;"></div>

</div><!-- /paper -->

  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                  'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const ahora = new Date();
  const mesNombre = meses[ahora.getMonth()];
  const anio = ahora.getFullYear();
  document.getElementById('mes-actual').textContent = mesNombre;
  document.title = `Informe de Grupo – ${mesNombre} ${anio}`;

  function toast(msg, ok=true) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = ok ? '#1a4a7a' : '#b91c1c';
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3500);
  }

  function toggleChoice(el, group) {
    document.querySelectorAll(`#${group} .choice`).forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
  }
  function selectPrec(card) {
    document.querySelectorAll('#precursor .prec-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    card.querySelector('input').checked = true;
  }

  function enviarAlExcel() {
    const nombre = document.getElementById('nombre').value;
    if (!nombre) { toast('⚠ Selecciona tu nombre primero.', false); return; }

    const participacion = document.querySelector('input[name="participacion"]:checked');
    const precursor     = document.querySelector('input[name="precursor"]:checked');
    const cursos  = document.getElementById('cursos').value;
    const horas   = document.getElementById('horas').value;
    const obs     = document.getElementById('obs').value;

    // Load template from base64
    const wb = XLSX.read(EXCEL_B64, { type: 'base64' });
    const ws = wb.Sheets[wb.SheetNames[0]];

    // Update MES in E2
    ws['E2'] = { v: mesNombre + ' ' + anio, t: 's' };

    // Find name row (data starts row 5 = index 4, 1-based)
    const range = XLSX.utils.decode_range(ws['!ref']);
    let targetRow = -1;
    for (let r = range.s.r; r <= range.e.r; r++) {
      const cell = ws[XLSX.utils.encode_cell({r, c: 0})];
      if (cell && cell.v && cell.v.toString().trim() === nombre.trim()) {
        targetRow = r;
        break;
      }
    }

    if (targetRow === -1) { toast('⚠ Nombre no encontrado en el Excel.', false); return; }

    const setCell = (col, val, type='s') => {
      const addr = XLSX.utils.encode_cell({r: targetRow, c: col});
      if (val !== '' && val !== null && val !== undefined) {
        ws[addr] = { v: val, t: type };
      }
    };

    // SI=col B(1), NO=col C(2), CURSOS=D(3), AUXILIAR=E(4), REGULAR=F(5), ESPECIAL=G(6), HORAS=H(7), OBS=I(8)
    if (participacion) {
      setCell(1, participacion.value === 'si' ? '✓' : '');
      setCell(2, participacion.value === 'no' ? '✓' : '');
    }
    if (cursos)  setCell(3, Number(cursos), 'n');
    if (precursor) {
      setCell(4, precursor.value === 'auxiliar' ? '✓' : '');
      setCell(5, precursor.value === 'regular'  ? '✓' : '');
      setCell(6, precursor.value === 'especial' ? '✓' : '');
    }
    if (horas) setCell(7, Number(horas), 'n');
    if (obs)   setCell(8, obs);

    // Download
    const nombreArchivo = `Informe_${nombre.replace(/[,\s]+/g,'_')}_${mesNombre}${anio}.xlsx`;
    XLSX.writeFile(wb, nombreArchivo);
    toast(`✅ Archivo descargado: ${nombreArchivo}`);
  }

    'Caro, Lucía de','Cosme Yach, Susana','García, Dacia','Mucún, Gladys',
    'Ordoñez, Adela de','Palencia Cabrera, Nataly','Palencia, Olga Cabrera de',
    'Queché Mejía, Lilian','Ramos, Joselín','Ruiz, Kathy de','Shovin, María de'
  ];

  function esHermana(nombre) {
    return nombresFemeninos.includes(nombre.trim());
  }

  function limpiarFormulario() {
    document.getElementById('nombre').value = '';
    document.getElementById('cursos').value = '';
    document.getElementById('horas').value  = '';
    document.getElementById('obs').value    = '';
    document.querySelectorAll('.choice').forEach(c => c.classList.remove('selected'));
    document.querySelectorAll('.prec-card').forEach(c => c.classList.remove('selected'));
    document.querySelectorAll('input[type=radio]').forEach(r => r.checked = false);
  }

  async function enviarAlSheets() {
    const nombre = document.getElementById('nombre').value;
    if (!nombre) { toast('⚠ Selecciona tu nombre primero.', false); return; }

    const participacion = document.querySelector('input[name="participacion"]:checked');
    const precursor     = document.querySelector('input[name="precursor"]:checked');
    const cursos = document.getElementById('cursos').value;
    const horas  = document.getElementById('horas').value;
    const obs    = document.getElementById('obs').value;

    const btn = document.getElementById('btn-sheets');
    btn.textContent = '⏳ Enviando…';
    btn.disabled = true;

    const payload = {
      nombre,
      si:       participacion?.value === 'si' ? 'X' : '',
      no:       participacion?.value === 'no' ? 'X' : '',
      cursos:   cursos  || '',
      auxiliar: precursor?.value === 'auxiliar' ? 'X' : '',
      regular:  precursor?.value === 'regular'  ? 'X' : '',
      especial: precursor?.value === 'especial' ? 'X' : '',
      horas:    horas || '',
      obs:      obs   || ''
    };

    try {
      // Mostrar gracias de inmediato y enviar en paralelo (no-cors no bloquea)
      const tratamiento = esHermana(nombre) ? 'hermana' : 'hermano';
      const primerNombre = nombre.split(',')[1]?.trim().split(' ')[0] || nombre.split(',')[0];
      limpiarFormulario();
      btn.textContent = '📤 Enviar a Sheets';
      btn.disabled = false;
      mostrarGracias(primerNombre, tratamiento);

      fetch(SHEETS_URL, {
        method: 'POST',
        mode:   'no-cors',
        body:   JSON.stringify(payload)
      }).catch(() => {});

    } catch (err) {
      toast('✗ No se pudo enviar. Verifica tu internet e intenta de nuevo.', false);
      btn.textContent = '📤 Enviar a Sheets';
      btn.disabled = false;
    }
  }

  function mostrarGracias(nombre, tratamiento) {
    // Crear overlay de agradecimiento
    const overlay = document.createElement('div');
    overlay.style.cssText = `
      position:fixed;inset:0;background:rgba(13,35,64,.82);
      display:flex;align-items:center;justify-content:center;
      z-index:9999;animation:fadeIn .3s ease;
    `;
    overlay.innerHTML = `
      <div style="
        background:#fff;border-radius:8px;padding:2.5rem 2rem;
        max-width:340px;width:90%;text-align:center;
        box-shadow:0 20px 60px rgba(0,0,0,.35);
        animation:popUp .35s cubic-bezier(.22,.68,0,1.3);
      ">
        <div style="font-size:3rem;margin-bottom:.5rem;">🙏</div>
        <h2 style="font-family:'Playfair Display',serif;color:#0d2340;font-size:1.4rem;margin-bottom:.8rem;">
          ¡Gracias, ${tratamiento} ${nombre}!
        </h2>
        <p style="color:#4b5563;font-size:.98rem;line-height:1.6;margin-bottom:1.5rem;">
          Tu informe fue enviado correctamente.<br>
          <strong style="color:#0f7a3e;">¡Que Jehová bendiga tu buen trabajo!</strong>
        </p>
        <button onclick="this.closest('div[style*=fixed]').remove()" style="
          background:#0d2340;color:#fff;border:none;
          padding:.6rem 1.8rem;border-radius:4px;
          font-family:inherit;font-size:.9rem;font-weight:600;
          cursor:pointer;letter-spacing:.04em;
        ">Cerrar</button>
      </div>
      <style>
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        @keyframes popUp  { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
      </style>
    `;
    document.body.appendChild(overlay);
    // Cierra también al hacer clic fuera
    overlay.addEventListener('click', e => { if(e.target === overlay) overlay.remove(); });
    // Auto-cierre en 4 segundos
    setTimeout(() => { if (overlay.parentNode) overlay.remove(); }, 4000);
  }
</script>
</body>
</html>
